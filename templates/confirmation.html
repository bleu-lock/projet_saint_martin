{% extends 'base.html' %}

{% block title %}Confirmation - Association Saint Martin{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex flex-col items-center justify-center p-4">
    <div class="text-center bg-white p-10 rounded-2xl shadow-xl max-w-lg w-full slide-up-anim">
        <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="text-3xl font-serif font-bold text-asm-dark mb-4">{{ title }}</h1>
        <p class="text-gray-600 mb-8">{{ desc }}</p>
        <a href="{{ url_for('index') }}" class="inline-block bg-asm-bordeaux text-white px-8 py-3 rounded-full font-medium shadow hover:bg-red-900 transition-colors">
            Retour à l'accueil
        </a>
    </div>
</section>
{% endblock %}
